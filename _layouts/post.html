<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Chemistry Spark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 3D Glassmorphism Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px 0;
        }

        body { padding-top: 100px; background-color: #f0f2f5; }

        /* Modern Floating Menu (Matching your screenshot) */
        .custom-menu-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 20px;
        }

        .menu-item {
            padding: 12px 15px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #eee;
        }

        .menu-item:last-child { border-bottom: none; }

        .search-bar-mock {
            background: #f1f3f4;
            border-radius: 30px;
            padding: 10px 20px;
            margin-top: 15px;
            color: #70757a;
            display: flex;
            align-items: center;
        }

        .search-dot {
            height: 10px;
            width: 10px;
            background-color: #ea4335;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* Post Content Card */
        .post-main-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header class="glass-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="https://chemistryspark.sudhirnama.in/favicon.ico" width="40" height="40" class="rounded-circle me-2" alt="Logo">
            <span class="fw-bold text-primary fs-4">Chemistry Spark</span>
        </a>
        <button class="btn border-0" type="button" data-bs-toggle="collapse" data-bs-target="#floatingMenu">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3E%3Cpath stroke='rgba(0, 0, 0, 0.5)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E" width="30">
        </button>
    </div>
</header>

<div class="collapse container mt-2" id="floatingMenu" style="position: fixed; top: 75px; z-index: 999; left: 0; right: 0;">
    <div class="row justify-content-end">
        <div class="col-md-4">
            <div class="custom-menu-card">
                <a href="https://chemistryspark.sudhirnama.in/p/books.html" class="menu-item">Books</a>
                <a href="https://chemistryspark.sudhirnama.in/p/videos.html" class="menu-item">Videos</a>
                <a href="/" class="menu-item">Blog</a>
                <div class="search-bar-mock">
                    <span class="search-dot"></span>
                    Search my site...
                </div>
            </div>
        </div>
    </div>
</div>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <article class="post-main-card">
                <h1 class="fw-bold">{{ page.title }}</h1>
                <p class="text-muted small">{{ page.date | date: "%B %d, %Y" }}</p>
                <hr>
                <div class="post-content">
                    {{ content }}
                </div>
            </article>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
