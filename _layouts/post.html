<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Chemistry Spark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
    /* --- EXACT HEADER STYLE FROM INDEX.HTML --- */
    :root { --primary-blue: #007bff; --dark-blue: #0056b3; }
    body { font-family: 'Inter', sans-serif; color: #333; padding-top: 85px; background: #fff; }

    .navbar { 
        background: rgba(255, 255, 255, 0.96) !important; 
        backdrop-filter: blur(15px); 
        border-bottom: 1px solid rgba(0, 123, 255, 0.1); 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        height: 85px; 
    }

    /* THE DUAL GRADIENT LOGO TEXT */
    .brand-text { 
        font-weight: 800; 
        font-size: 1.5rem; 
        background: linear-gradient(45deg, var(--primary-blue), #00c6ff); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        margin-left: 10px;
    }

    .brand-logo-box { 
        width: 40px; height: 40px; background: #fff; border-radius: 8px; 
        display: flex; align-items: center; justify-content: center; 
        overflow: hidden; box-shadow: 0 3px 8px rgba(0,0,0,0.1); 
    }

    /* --- FLOATING MENU (92% WIDTH CARD) --- */
    @media (max-width: 991px) {
        .navbar-collapse {
            background: #ffffff !important;
            position: fixed !important;
            top: 85px !important; 
            left: 4% !important; 
            width: 92% !important; 
            padding: 20px !important;
            border-radius: 20px !important; 
            border-bottom: 3px solid #007bff !important; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.3) !important;
            z-index: 999999 !important;
            height: auto !important;
            display: block !important;
        }
    }

    .nav-link { font-weight: 700 !important; color: #111 !important; border-bottom: 1px solid #eee; padding: 15px 0 !important; }

    /* PULSING SEARCH DOT */
    @keyframes pulse-red-fixed {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 0, 0, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <div class="brand-logo-box">
                <img src="https://images.sudhirnama.in/images/chemistry-spark.webp" alt="Logo" style="width:100%">
            </div>
            <span class="brand-text">Chemistry Spark</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#hyperNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="hyperNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 w-100">
                <li class="nav-item"><a class="nav-link" href="/#books">Books</a></li>
                <li class="nav-item"><a class="nav-link" href="/#videos">Videos</a></li>
                <li class="nav-item"><a class="nav-link" href="/#latest-articles">Blog</a></li>
            </ul>
            
            <div style="width: 100%; background: #f1f1f1; border-radius: 50px; padding: 5px 15px; margin-top:10px;">
                <form action="https://www.google.com/search" method="GET" style="display: flex; align-items: center; width: 100%;">
                    <span style="height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; animation: pulse-red-fixed 1.5s infinite;"></span>
                    <input type="hidden" name="as_sitesearch" value="chemistryspark.sudhirnama.in">
                    <input type="text" name="q" placeholder="Search my site..." required 
                           style="border: none; background: transparent; outline: none; flex: 1; padding: 10px; font-size: 16px;">
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <article class="post-card">
                <h1 class="display-5 mb-3">{{ page.title }}</h1>
                <p class="text-muted small">Published on {{ page.date | date: "%B %d, %Y" }}</p>
                <hr class="my-4">
                <div class="post-body">
                    {{ content }}
                </div>
            </article>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-close menu on link click (Same as index.html)
    document.addEventListener('click', function (event) {
        var menu = document.getElementById('hyperNav');
        if (event.target.classList.contains('nav-link')) {
            var bsCollapse = new bootstrap.Collapse(menu, {toggle: false});
            bsCollapse.hide();
        }
    });
</script>


    <script>
document.addEventListener('click', function (event) {
    var menu = document.getElementById('hyperNav');
    if (event.target.classList.contains('nav-link')) {
        var bsCollapse = new bootstrap.Collapse(menu, {toggle: false});
        bsCollapse.hide();
    }
});
    </script>
</body>
</html>
